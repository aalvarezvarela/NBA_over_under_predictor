name: Daily NBA Predictor (Local Runner)

on:
    workflow_dispatch:
    schedule:
        # Every day at midnight UTC
        - cron: "01 0 * * *"
        # Weekdays during peak hours
        - cron: "01 19 * * 1-5"
        - cron: "01 20 * * *"
        - cron: "01 22 * * *"
        # Sundays at 16:30 and 18:00 UTC
        - cron: "27 16 * * 0"
        - cron: "01 18 * * 0"

concurrency:
    group: daily-nba-predictor
    cancel-in-progress: true

permissions:
    contents: read
    id-token: write

jobs:
    run:
        runs-on: self-hosted
        env:
            PYTHONWARNINGS: "ignore::UserWarning,ignore::DeprecationWarning,ignore::FutureWarning,ignore::PerformanceWarning"

            # Critical for resolving imports that live under src/
            PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src

            DB_ENV: supabase
            SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
            SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
            ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
            S3_AWS_PROFILE: ""

            # Cron runs in UTC; keep runtime consistent
            TZ: UTC

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  aws-region: eu-west-1

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Run NBA predictor
              run: python scripts/predict_nba_games.py --no-tabpfn

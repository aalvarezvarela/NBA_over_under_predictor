name: Monthly DB Backup to S3

on:
    workflow_dispatch:
    schedule:
        # 1st of every month at 06:00 UTC
        - cron: "0 6 1 * *"

concurrency:
    group: monthly-db-backup
    cancel-in-progress: true

permissions:
    contents: read
    id-token: write

jobs:
    backup:
        runs-on: ubuntu-latest
        env:
            PYTHONWARNINGS: "ignore::UserWarning,ignore::DeprecationWarning,ignore::FutureWarning,ignore::PerformanceWarning"
            PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src

            DB_ENV: supabase
            SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
            SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
            S3_AWS_PROFILE: ""

            TZ: UTC

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  aws-region: eu-west-1

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Backup all schemas to S3
              run: python scripts/backup_db_to_s3.py
